<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumbangan | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="images/logo_d360.png" alt="Derma360 Logo">
            </a>
        </div>

        <nav>
            <a href="donor-dashboard.html">Papan Pemuka</a>
            <a href="campaign.html">Kempen</a>
            <a href="history.html">Sejarah</a>
            <a href="profile.html">Profil Saya</a>
            <button id="logoutBtn" class="nav-logout">Log Keluar</button>
        </nav>
    </header>

    <main class="auth-container donation-wrapper">

        <div class="donation-card">

            <h1>Buat Sumbangan</h1>
            <p class="subtitle">
                Salurkan sumbangan anda dengan mudah dan selamat.
            </p>

            <!-- Maklumat Kempen -->
            <div id="campaignInfo" class="campaign-info-box">
                <p>Sedang memuatkan maklumat kempen...</p>
            </div>

            <!-- Borang -->
            <form id="donationForm">

                <!-- Nama -->
                <div class="form-group">
                    <label for="donorName">Nama Penyumbang *</label>
                    <input type="text" id="donorName" placeholder="Masukkan nama penuh" required>
                </div>

                <!-- Jumlah -->
                <div class="form-group">

                    <label for="amount">
                        Pilih Jumlah Sumbangan (RM) *
                    </label>

                    <div class="amount-chips">
                        <button type="button" class="chip-btn" data-value="20">
                            RM20
                        </button>

                        <button type="button" class="chip-btn" data-value="50">
                            RM50
                        </button>

                        <button type="button" class="chip-btn" data-value="100">
                            RM100
                        </button>

                        <button type="button" class="chip-btn" data-value="150">
                            RM150
                        </button>
                    </div>

                    <input type="number" id="amount" min="10" step="1"
                        placeholder="Atau masukkan jumlah lain (Minimum RM10)" required>

                </div>

                <!-- Payment -->
                <div class="form-group">
                    <label>Pilih Kaedah Pembayaran</label>
                
                    <div class="payment-methods-grid">
                        <label class="payment-card">
                            <input type="radio" name="paymentMethod" value="DuitNow QR" required>
                            <div class="payment-icon">📱</div>
                            <div class="payment-title">DuitNow QR</div>
                        </label>
                
                        <label class="payment-card">
                            <input type="radio" name="paymentMethod" value="FPX Perbankan atas talian">
                            <div class="payment-icon">🏦</div>
                            <div class="payment-title">FPX Perbankan atas talian</div>
                        </label>
                
                        <label class="payment-card">
                            <input type="radio" name="paymentMethod" value="Kad Kredit/Debit">
                            <div class="payment-icon">💳</div>
                            <div class="payment-title">Kad Kredit/Debit</div>
                        </label>
                    </div>

                </div>

                <button type="submit" class="primary-btn submit-btn">

                    Teruskan Pembayaran

                </button>

            </form>

            <p id="message"></p>

            <div class="back-link">
                <a href="campaign.html">
                    ← Kembali ke Senarai Kempen
                </a>
            </div>

        </div>

    </main>

    <!-- ========================= -->
    <!-- Amount Chips -->
    <!-- ========================= -->

    <script>
        const chipButtons = document.querySelectorAll(".chip-btn");
        const amountInput = document.getElementById("amount");

        chipButtons.forEach(button => {

            button.addEventListener("click", () => {

                chipButtons.forEach(btn =>
                    btn.classList.remove("active")
                );

                button.classList.add("active");

                amountInput.value = button.dataset.value;

            });

        });

        amountInput.addEventListener("input", () => {

            chipButtons.forEach(btn =>
                btn.classList.remove("active")
            );

        });
    </script>

    <!-- ========================= -->
    <!-- Payment Card -->
    <!-- ========================= -->

    <script>
        document.querySelectorAll(".payment-card").forEach(card => {

            card.addEventListener("click", () => {

                document.querySelectorAll(".payment-card")
                    .forEach(c => c.classList.remove("selected"));

                card.classList.add("selected");

                card.querySelector("input").checked = true;

            });

        });
    </script>

    <!-- Firebase -->
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/donation.js"></script>

    <!-- Accessibility -->
    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">
        ♿
    </button>

    <div id="a11y-panel-slot"></div>

    <!-- Voice -->
    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">
        🎤
    </button>

    <p id="voiceStatus"></p>

    <script src="js/accessibility.js"></script>
    <script src="js/voice-command.js"></script>

</body>

</html>
