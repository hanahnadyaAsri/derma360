<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Kata Laluan | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-container">
        <h1>Lupa Kata Laluan</h1>
        <p>Masukkan alamat e-mel anda untuk menerima pautan tetapan semula kata laluan.</p>

        <form id="forgotPasswordForm">
            <input type="email" id="email" placeholder="Alamat E-mel" required>
            <button type="submit">Hantar Pautan Reset</button>
        </form>

        <p id="message"></p>

        <p>
            <a href="login.html">Kembali ke Log Masuk</a>
        </p>
    </div>

    <script type="module" src="js/forgot-password.js"></script>
</body>

</html>
