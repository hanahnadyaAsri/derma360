<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Kata Laluan | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-container">

        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="margin-bottom: 10px;">Lupa Kata Laluan</h1>
            <p style="color: var(--muted); font-size: 0.95rem; line-height: 1.5;">
                Masukkan alamat e-mel berdaftar anda untuk menerima pautan tetapan semula kata laluan.
            </p>
        </div>

        <form id="forgotPasswordForm">
            <div style="margin-bottom: 15px;">
                <input type="email" id="email" placeholder="Alamat E-mel" required style="width: 100%;">
            </div>

            <button type="submit" style="margin-top: 5px; font-size: 1.05rem;">Hantar Pautan Reset</button>
        </form>

        <p id="message" style="text-align: center; font-weight: 600; margin-top: 15px;"></p>

        <div style="text-align: center; margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;">
            <p style="font-size: 0.95rem;">
                <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Kembali
                    ke Log Masuk</a>
            </p>
        </div>

    </div>

    <script type="module" src="js/forgot-password.js"></script>

    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">
        ♿
    </button>

    <div id="a11y-panel-slot"></div>

    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">
        🎤
    </button>

    <p id="voiceStatus"></p>

    <script src="js/accessibility.js"></script>
    <script src="js/voice-command.js"></script>
</body>

</html>
