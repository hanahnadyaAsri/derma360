<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Peranan | Derma360</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background: #f5f7fa;
        }

        .mode-container {
            max-width: 1100px;
            margin: 60px auto;
            text-align: center;
            padding: 20px;
        }

        .mode-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .mode-container h1 {
            font-size: 52px;
            margin-bottom: 10px;
            color: #008080;
        }

        .mode-container p {
            font-size: 22px;
            color: #555;
            margin-bottom: 50px;
        }

        .mode-cards {
            display: flex;
            justify-content: center;
            gap: 35px;
            flex-wrap: wrap;
        }

        .mode-card {
            width: 360px;
            background: white;
            border-radius: 22px;
            padding: 40px 30px;
            text-decoration: none;
            color: #222;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .10);
            transition: .25s;
        }

        .mode-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, .18);
        }

        .mode-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            margin-bottom: 25px;
        }

        .donor {
            background: #dff7e8;
        }

        .applicant {
            background: #dcefff;
        }

        .mode-card h2 {
            margin: 0;
            font-size: 32px;
        }

        .mode-card p {
            font-size: 18px;
            margin-top: 12px;
            color: #666;
        }

        .logout-link {
            margin-top: 50px;
        }

        .logout-link a {
            color: #008080;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        @media(max-width:768px) {

            .mode-container h1 {
                font-size: 40px;
            }

            .mode-card {
                width: 100%;
            }

        }
    </style>

</head>

<body>

    <div id="a11y-top">

            <button id="a11y-toggle" class="nav-btn" aria-label="Buka Mod Kebolehcapaian">

                Mod Kebolehcapaian

            </button>

    <div id="a11y-panel-slot"></div>

    </div>

    <div class="mode-container">

        <!-- Replace with your own logo -->
        <img src="images/logo_d360.png" class="mode-logo" alt="Derma360 Logo">

        <h1>Derma360</h1>

        <p>
            Selamat datang,
            <strong><span id="userName"></span></strong>
            <br><br>

            Bagaimanakah anda ingin menggunakan Derma360 hari ini?
        </p>

        <div class="mode-cards">

            <a href="donor-dashboard.html" class="mode-card">

                <div class="mode-icon donor">
                    💝
                </div>

                <h2>Penyumbang</h2>

                <p>
                    Lihat kempen yang telah disahkan dan
                    salurkan sumbangan kepada mereka yang memerlukan.
                </p>

            </a>

            <a href="applicant-dashboard.html" class="mode-card">

                <div class="mode-icon applicant">
                    ❤️
                </div>

                <h2>Pemohon Sumbangan</h2>

                <p>
                    Mohon bantuan dengan mencipta kempen baharu
                    untuk disemak oleh pentadbir.
                </p>

            </a>

        </div>

        <div class="logout-link">
            <button id="logoutBtn" class="secondary-btn">
                Log Keluar
            </button>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/choose-mode.js"></script>

    <script src="js/accessibility.js"></script><!-- ACCESSIBILITY BUTTON -->
    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">
        ♿
    </button>
    
    <div id="a11y-panel-slot"></div>
    
    <!-- VOICE COMMAND BUTTON -->
    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">
        🎤
    </button>
    
    <p id="voiceStatus"></p>

<script src="js/voice-command.js"></script>
</body>

</html>
