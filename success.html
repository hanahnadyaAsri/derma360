<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berjaya | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="images/logo_d360.png" alt="Derma360 Logo">
            </a>
        </div>
        <nav>
            <a href="donor-dashboard.html">Papan Pemuka</a>
            <a href="campaign.html">Kempen</a>
            <a href="history.html">Sejarah</a>
        </nav>
    </header>

    <main class="donation-wrapper">
        <div class="donation-card success-card" style="text-align: center;">

            <div style="font-size: 3.5rem; margin-bottom: 0.5rem;">✅</div>

            <h1>Pembayaran Berjaya!</h1>
            <p class="subtitle" id="statusMessage">Sumbangan anda telah diluluskan dan direkodkan.</p>

            <div id="paymentDetailsBox"
                style="background: #f8fafc; border: 1px solid #cbd5e1; padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; text-align: left;">
                <p style="font-size: 0.9rem; color: #334155; margin-bottom: 0.5rem;">Kaedah: <strong id="methodText"
                        style="color: #0b6653;">-</strong></p>
                <p style="font-size: 0.9rem; color: #334155; margin-bottom: 0.5rem;">Status: <strong
                        style="color: #10b981;">Lulus (Approved)</strong></p>
                <p style="font-size: 0.9rem; color: #334155; margin-bottom: 0;">No. Rujukan: <strong id="refCodeDisplay"
                        style="font-family: monospace;">-</strong></p>
            </div>

            <div id="qrSection" style="display: none; margin-bottom: 1.5rem; text-align: center;">
                <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 0.5rem;">Imbasan DuitNow QR (Simulasi)</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=Derma360-DuitNow-Verified"
                    alt="DuitNow QR"
                    style="width: 130px; height: 130px; border-radius: 8px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            </div>

            <div class="action-buttons"
                style="display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem;">
                <button id="receiptBtn" class="primary-btn submit-btn" style="width: 100%;">📄 Lihat & Muat Turun Resit
                    Rasmi</button>
                <a href="history.html"
                    style="color: #0b6653; text-decoration: none; font-weight: 600; font-size: 0.95rem; padding: 0.5rem;">Kembali
                    ke Sejarah Sumbangan</a>
            </div>

        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const receiptId = params.get("receiptId");
        const method = params.get("method") || "FPX / Card"; // Tangkap kaedah jika dihantar dari donation.js

        // Paparkan maklumat mengikut kaedah
        document.getElementById("methodText").textContent = method.toUpperCase();

        const refDisplay = document.getElementById("refCodeDisplay");
        refDisplay.textContent = receiptId ? "D360-" + receiptId.substring(0, 8).toUpperCase() : "D360-PAY-" + Math.floor(100000 + Math.random() * 900000);

        // Jika kaedah adalah QR, tunjukkan kotak QR mockup
        if (method.toLowerCase().includes('qr')) {
            document.getElementById("qrSection").style.display = "block";
        }

        document.getElementById("receiptBtn").addEventListener("click", () => {
            if (receiptId) {
                window.location.href = `receipt.html?receiptId=${receiptId}`;
            } else {
                window.location.href = `history.html`;
            }
        });
    </script>

    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">♿</button>
    <div id="a11y-panel-slot"></div>
    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">🎤</button>
    <p id="voiceStatus"></p>

    <script src="js/accessibility.js"></script>
    <script src="js/voice-command.js"></script>
</body>

</html>
