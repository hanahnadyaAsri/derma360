<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-container">

        <div style="margin-bottom: 20px;">
            <a href="choose-mode.html"
                style="display: inline-block; background-color: var(--accent); color: #ffffff; padding: 10px 18px; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.9rem; transition: 0.2s ease;">
                 Kembali 
            </a>
        </div>

        <h1>Profil Saya</h1>
        <p>Papar dan kemas kini maklumat peribadi anda.</p>

        <div class="profile-image-container" style="text-align: center; margin-bottom: 20px;">
            <img id="profilePreview" src="https://placehold.co/180x180?text=Profil" alt="Gambar Profil"
                style="width: 110px; height: 110px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 12px auto;">

            <label for="profileImage"
                style="display: inline-block; background-color: var(--primary); color: #ffffff; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer;">
                Tukar Gambar Profil
            </label>
            <input type="file" id="profileImage" accept="image/*" style="display: none;">
        </div>

        <form id="profileForm">
            <input type="text" id="name" placeholder="Nama Penuh" required>

            <div style="margin-bottom: 12px;">
                <input type="email" id="email" placeholder="Alamat E-mel" disabled
                    style="width: 100%; background-color: #e2e8f0; cursor: not-allowed;">
            </div>

            <input type="text" id="phone" placeholder="Nombor Telefon" required>

            <div style="margin-bottom: 12px;">
                <input type="text" id="ic_number" placeholder="Nombor Kad Pengenalan" required
                    style="width: 100%; background-color: #e2e8f0; cursor: not-allowed;">
            </div>

            <textarea id="address" placeholder="Alamat"></textarea>

            <div style="margin-bottom: 12px;">
                <input type="text" id="pwd_card_number" placeholder="Nombor Kad OKU (Pilihan)"
                    style="width: 100%; background-color: #e2e8f0; cursor: not-allowed;">
            </div>

            <input type="text" id="disability_category" placeholder="Kategori Ketidakupayaan (Pilihan)">

            <button type="submit">Kemaskini Profil</button>
        </form>

        <p id="message"></p>

    </div>

    <script type="module" src="js/profile.js"></script>
    <script src="js/accessibility.js"></script>
    <script src="js/voice-command.js"></script>

    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">
        ♿
    </button>

    <div id="a11y-panel-slot"></div>

    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">
        🎤
    </button>

    <p id="voiceStatus"></p>

</body>

</html>
