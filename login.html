<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="a11y-top">

            <button id="a11y-toggle" class="nav-btn" aria-label="Buka Mod Kebolehcapaian">

            Mod Kebolehcapaian

            </button>

    <div id="a11y-panel-slot"></div>

    </div>

    <div class="auth-container">

        <h1>Log Masuk</h1>

        <p>
            Selamat datang kembali ke Derma360
        </p>

        <form id="loginForm">
        
            <input type="email" id="email" placeholder="Alamat E-mel" required>
        
            <div class="password-group">
                <input type="password" id="password" placeholder="Kata Laluan" required>
        
                <button type="button" class="toggle-password" data-target="password"
                    aria-label="Papar atau sembunyikan kata laluan">
                    👁️
                </button>
            </div>
        
            <p class="forgot-link">
                <a href="forgot-password.html">Lupa kata laluan?</a>
            </p>
        
            <button type="submit">
                Log Masuk
            </button>
        
        </form>


        <p>
            Belum mempunyai akaun?
            <a href="register.html">
                Daftar di sini
            </a>
        </p>

        <p id="message"></p>

    </div>

    <script type="module" src="js/login-handler.js"></script>

    <script src="js/accessibility.js"></script>`r`n</body>

</html>
