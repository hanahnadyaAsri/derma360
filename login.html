<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-container">

        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="margin-bottom: 8px;">Log Masuk</h1>
            <p style="color: var(--muted); font-size: 0.95rem;">
                Selamat datang kembali ke Derma360
            </p>
        </div>

        <form id="loginForm">

            <div style="margin-bottom: 12px;">
                <input type="email" id="email" placeholder="Alamat E-mel" required style="width: 100%;">
            </div>

            <div class="password-group" style="margin-bottom: 5px;">
                <input type="password" id="password" placeholder="Kata Laluan" required style="width: 100%;">
                <button type="button" class="toggle-password" data-target="password"
                    aria-label="Papar atau sembunyikan kata laluan">
                    👁️
                </button>
            </div>

            <div style="text-align: right; margin-bottom: 15px;">
                <a href="forgot-password.html"
                    style="font-size: 0.88rem; color: var(--primary); text-decoration: none; font-weight: 600;">Lupa
                    kata laluan?</a>
            </div>

            <button type="submit" style="margin-top: 5px; font-size: 1.05rem;">
                Log Masuk
            </button>

        </form>

        <div style="text-align: center; margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;">
            <p style="font-size: 0.95rem;">
                Belum mempunyai akaun?
                <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Daftar
                    di sini</a>
            </p>
        </div>

        <p id="message" style="text-align: center; font-weight: 600; margin-top: 15px;"></p>

    </div>

    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">
        ♿
    </button>

    <div id="a11y-panel-slot"></div>

    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">
        🎤
    </button>

    <p id="voiceStatus"></p>

    <script type="module" src="js/login-handler.js"></script>
    <script src="js/accessibility.js"></script>
    <script src="js/voice-command.js"></script>

</body>

</html>
