<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipta Kempen | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="images/logo_d360.png" alt="Derma360 Logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Laman Utama</a>
            <a href="applicant-dashboard.html">Papan Pemuka</a>
            <a href="my-campaign.html">Kempen Saya</a>
            <a href="profile.html">Profil Saya</a>
            <button id="logoutBtn" class="nav-logout">Log Keluar</button>
                    <button id="a11y-toggle" class="nav-btn" aria-label="Buka Mod Kebolehcapaian">

                Mod Kebolehcapaian

            </button>

        </nav>
    </header>

    <div id="a11y-panel-slot"></div>

    <main class="auth-container">
        <h1>Cipta Kempen Bantuan</h1>
        <p>Lengkapkan maklumat kempen dan hantar untuk semakan pentadbir.</p>

        <form id="campaignForm">

            <label for="campaignTitle">Tajuk Kempen *</label>
            <input type="text" id="campaignTitle" maxlength="100" required>

            <label for="campaignCategory">Kategori Kempen *</label>
            <select id="campaignCategory" required>
                <option value="">Pilih Kategori</option>
                <option value="Medical">Perubatan</option>
                <option value="Food">Makanan</option>
                <option value="Equipment">Peralatan</option>
            </select>

            <label for="targetAmount">Sasaran Dana (RM) *</label>
            <input type="number" id="targetAmount" min="1" required>

            <label for="endDate">Tarikh Tamat Kempen *</label>
            <input type="date" id="endDate" required>

            <label for="beneficiaryName">Nama Penerima Bantuan *</label>
            <input type="text" id="beneficiaryName" required>

            <label for="location">Lokasi *</label>
            <input type="text" id="location" placeholder="Contoh: Kajang, Selangor" required>

            <label for="description">Penerangan Kempen *</label>
            <textarea id="description" required></textarea>

            <label for="campaignPoster">Poster Kempen *</label>
            <input type="file" id="campaignPoster" accept="image/*" required>

            <div class="poster-preview">
                <img id="posterPreview" src="https://placehold.co/800x450?text=Poster+Kempen"
                    alt="Pratonton Poster Kempen">
            </div>

            <label for="supportingDocs">Dokumen Sokongan / Imej</label>
            <input type="file" id="supportingDocs" accept=".pdf,image/*" multiple>

            <button type="submit">Hantar Kempen</button>
        </form>

        <p id="message"></p>

        <p>
            <a href="applicant-dashboard.html">Kembali ke Papan Pemuka Pemohon</a>
        </p>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/campaign.js"></script>

    <script src="js/accessibility.js"></script><!-- ACCESSIBILITY BUTTON -->
    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">
        ♿
    </button>
    
    <div id="a11y-panel-slot"></div>
    
    <!-- VOICE COMMAND BUTTON -->
    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">
        🎤
    </button>
    
    <p id="voiceStatus"></p>

<script src="js/voice-command.js"></script>
</body>

</html>
