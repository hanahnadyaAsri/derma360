<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Campaign | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-container">
        <h1>Create Donation Campaign</h1>
        <p>Submit your campaign for admin verification.</p>

        <form id="campaignForm">

            <input type="text" id="campaignTitle" placeholder="Campaign Title" maxlength="100" required>

            <select id="campaignCategory" required>
                <option value="">Select Category</option>
                <option value="Medical">Medical</option>
                <option value="Food">Food</option>
                <option value="Equipment">Equipment</option>
            </select>

            <input type="number" id="targetAmount" placeholder="Target Amount (RM)" min="1" required>

            <label for="endDate">Campaign End Date *</label>
            <input type="date" id="endDate" required>

            <input type="text" id="beneficiaryName" placeholder="Beneficiary Name" required>

            <input type="text" id="location" placeholder="Location (City / State)" required>

            <textarea id="description" placeholder="Campaign Description" required></textarea>

            <label for="campaignPoster">Campaign Poster / Media *</label>
            <input type="file" id="campaignPoster" accept="image/*,video/*" required>

            <div class="poster-preview">
                <img id="posterPreview" src="https://placehold.co/500x280?text=Campaign+Media"
                    alt="Campaign Poster Preview">
            </div>

            <label for="supportingDocs">Supporting Documents / Images</label>
            <input type="file" id="supportingDocs" accept=".pdf,image/*" multiple>

            <button type="submit">Submit Campaign</button>
        </form>

        <p id="message"></p>
        <p><a href="applicant-dashboard.html">Back to Dashboard</a></p>
    </div>

    <script type="module" src="js/campaign.js"></script>
</body>

</html>
