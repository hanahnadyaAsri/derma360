<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kempen Saya | Derma360</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <header class="navbar">

        <div class="logo">
            <a href="index.html">
                <img src="images/logo_d360.png" alt="Derma360 Logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Laman Utama</a>
            <a href="applicant-dashboard.html">Papan Pemuka</a>
            <a href="create-campaign.html">Cipta Kempen</a>
            <a href="profile.html">Profil Saya</a>

            <button id="logoutBtn" class="nav-logout">
                Log Keluar
            </button>
        </nav>

    </header>


    <!-- Main Content -->

    <main class="auth-container">

        <h1>Kempen Saya</h1>

        <p>
            Berikut ialah semua kempen yang telah anda cipta.
            Anda boleh melihat status, jumlah dana terkumpul,
            dan mengemas kini maklumat kempen jika diperlukan.
        </p>

        <!-- Search -->

        <input type="text" id="searchCampaign" placeholder="Cari kempen...">

        <!-- Filter -->

        <select id="statusFilter">

            <option value="All">Semua Status</option>

            <option value="Perlu Disahkan">
                Menunggu Pengesahan
            </option>

            <option value="Aktif">
                Aktif
            </option>

            <option value="Ditolak">
                Ditolak
            </option>

            <option value="Tamat">
                Tamat
            </option>

        </select>

        <br><br>

        <!-- Campaign List -->

        <div id="myCampaignList">

            <p>Sedang memuatkan kempen...</p>

        </div>

    </main>

    <!-- Footer -->

    <footer>

        <p>
            © 2026 Derma360. Hak Cipta Terpelihara.
        </p>

    </footer>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/my-campaign.js"></script>

    <script src="js/accessibility.js"></script>
    <script src="js/voice-command.js"></script>
    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">
        ♿
    </button>
    
    <div id="a11y-panel-slot"></div>
    
    <!-- VOICE COMMAND BUTTON -->
    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">
        🎤
    </button>
    
    <p id="voiceStatus"></p>

</body>

</html>
