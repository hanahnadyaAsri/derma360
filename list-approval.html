<!DOCTYPE html>
<html lang="ms">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengesahan Kempen | Derma360</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-layout">

        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="images/logo_d360.png" alt="Derma360 Logo">
                <span>Derma360</span>
            </div>

            <div class="sidebar-menu-category">MENU UTAMA</div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html">
                    <span class="icon">📊</span>Papan Pemuka
                </a>
                <a href="list-user.html">
                    <span class="icon">👥</span> Pengguna
                </a>
                <a href="campaign-admin.html">
                    <span class="icon">📢</span> Kempen
                </a>
                <a href="list-approval.html" class="active">
                    <span class="icon">⏳</span> Pengesahan
                </a>
                <a href="list-report.html">
                    <span class="icon">📈</span> Laporan
                </a>
            </nav>

            <div class="sidebar-menu-category">TETAPAN</div>
            <nav class="sidebar-nav">
                <button id="logoutBtn" class="sidebar-logout">
                    <span class="icon">🚪</span> Log Keluar
                </button>
            </nav>
        </aside>

        <main class="main-content">

            <header class="content-header">
                <div class="header-title">
                    <h1>Senarai Kempen Untuk Disahkan</h1>
                    <p>Kempen di bawah memerlukan semakan dan pengesahan lanjut daripada pentadbir.</p>

                <div class="header-profile">
                    <span class="notification-badge">🔔</span>
                    <div class="profile-pic">A</div>
                </div>
            </header>

            <section class="table-container">
                <div id="pendingCampaigns">
                    <p style="color: var(--text-muted); text-align: center; padding: 20px;">Sedang memuatkan kempen...
                    </p>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="js/list-approval.js"></script>
    <script type="module" src="js/admin.js"></script>
    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">♿</button>
    <div id="a11y-panel-slot"></div>
    <button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">🎤</button>
    <p id="voiceStatus"></p>
