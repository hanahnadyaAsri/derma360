<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derma360 | Pendaftaran</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>


    <div class="auth-container">
        <h1>Daftar Pengguna</h1>
        <p>Muat naik dokumen untuk pengesahan OCR, kemudian semak dan sahkan maklumat anda.</p>

        <form id="registerForm">

            <label>Muat Naik MyKad / Kad OKU / Dokumen NGO</label>
            <input type="file" id="documentUpload" accept="image/*">

            <button type="button" id="ocrBtn">Ekstrak Maklumat dengan OCR</button>

            <p id="ocrStatus"></p>

            <input type="text" id="name" placeholder="Nama Penuh" required>

            <input type="text" id="ic_number" placeholder="Nombor Kad Pengenalan" required>

            <textarea id="address" placeholder="Alamat yang diekstrak daripada dokumen"></textarea>

            <input type="email" id="email" placeholder="Alamat E-mel" required>

            <div class="password-group">
                <input type="password" id="password" placeholder="Kata Laluan" required>
                <button type="button" class="toggle-password" data-target="password">👁️</button>
            </div>

            <div class="password-group">
                <input type="password" id="confirmPassword" placeholder="Sahkan Kata Laluan" required>
                <button type="button" class="toggle-password" data-target="confirmPassword">👁️</button>
            </div>

            <input type="text" id="phone" placeholder="Nombor Telefon" required>

            <input type="text" id="pwd_card_number" placeholder="Nombor Kad OKU (Pilihan)">

            <input type="text" id="disability_category" placeholder="Kategori Ketidakupayaan (Pilihan)">

            <button type="submit">Daftar</button>

        </form>

        <p>Sudah mempunyai akaun? <a href="login.html">Log masuk di sini</a></p>
        <p id="message"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="js/ocr-handler.js"></script>
    <script type="module" src="js/register.js"></script>

<button id="a11y-toggle" class="a11y-toggle" type="button" aria-label="Buka Mod Kebolehcapaian">
    ♿
</button>

<div id="a11y-panel-slot"></div>

<!-- VOICE COMMAND BUTTON -->
<button id="voiceBtn" class="voice-btn" type="button" aria-label="Arahan Suara">
    🎤
</button>

<p id="voiceStatus"></p>

<script src="js/accessibility.js"></script>
<script src="js/voice-command.js"></script>
</body>

</html>
